name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  NODE_OPTIONS: --no-deprecation

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Verify pom.xml version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pom=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [ "$tag" != "$pom" ]; then
            echo "pom.xml version ($pom) does not match tag ($tag)" >&2
            exit 1
          fi

  native-linux-x86_64:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native image
        run: ./mvnw -Pnative -B -DskipTests native:compile
      - name: Rename binary
        run: mv target/depot target/depot-linux-x86_64
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: target/depot-linux-x86_64
